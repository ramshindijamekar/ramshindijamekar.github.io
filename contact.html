		<form id="contactForm">
			<div class="fields">
				<div class="field">
					<label for="name">Name</label>
					<input type="text" name="name" id="name" />
				</div>
				<div class="field">
					<label for="email">Email</label>
					<input type="text" name="email" id="email" />
				</div>
				<div class="field">
					<label for="message">Message</label>
					<textarea name="message" id="message" rows="3"></textarea>
				</div>
			</div>
			<ul class="actions">
				<li><input type="submit" value="Send Message" /></li>
			</ul>
		</form>

		<script>
		document.getElementById("contactForm").addEventListener("submit", function(event) {
			event.preventDefault(); // Prevent the default form submission
			
			// Get form values
			var name = document.getElementById("name").value;
			var email = document.getElementById("email").value;
			var message = document.getElementById("message").value;
			
			// Construct the mailto link
			var mailtoLink = "mailto:shindijamekar.1101@gmail.com" +
							"?subject=" + encodeURIComponent("Message from " + name) +
							"&body=" + encodeURIComponent("Sender's Name: " + name + "\n" +
														"Sender's Email: " + email + "\n" +
														"Message: " + message);
			
			// Open the mail client with the mailto link
			window.location.href = mailtoLink;
		});
		</script>
